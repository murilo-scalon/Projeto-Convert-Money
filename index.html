<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <title>DevClub - Convert Money</title>
</head>

<body>
    <div>
        <header>
            <img src="./assets/logo.gif" alt="logo-changeMoney" />
        </header>
        <section>
            <div id="divConvertFrom">
                <h1 id="convert-from">Converter de</h1>
                <select class="select-from">R$ Real Brasileiro</select>
                <select class="select-from">US$ Dólar Americano</select>
                <select class="select-from">¢ Euro</select>
                <select class="select-from">£ Libra</select>
                <select class="select-from">₿ Bitcoin</select>
            </div>
            <div id="divConvertFor">
                <h2 id="convert-for">Converter para</h2>
                <select class="select-for">US$ Dólar Americano</select>
                <select class="select-for">R$ Real Brasileiro</select>
                <select class="select-for">¢ Euro</select>
                <select class="select-for">£ Libra</select>
                <select class="select-for">₿ Bitcoin</select>
            </div>
            <div id="div-valor">
                <h3 id="valor">Valor</h3>
                <input placeholder="Coloque aqui o valor para conversão">
            </div>
            <footer>
                <div id="divEnd">
                    <img id="brasil" src="./assets/brasil 2.png" alt="brasil" />
                    <h4 class="title-end">Real</h4>
                    <p class="paragraph-end">R$</p>
                    <img id="arrow" src="./assets/Vector.png" alt="arrow-img" />
                    <img id="usa" src="./assets/estados-unidos (1) 1.png" alt="usa-img" />
                    <h5 class="title-end">Dólar Americano</h5>
                    <p class="paragraph-end">US$</p>
                </div>
            </footer>
        </section>
    </div>
</body>

</html>
