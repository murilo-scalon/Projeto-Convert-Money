<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <title>DevClub - Convert Money</title>
</head>

<body>

    <img id="img-logo" src="./assets/logo.gif" alt="logo-changeMoney" />
    <main>
        <div id="divConvertFrom">
            <label id="convert-from">Converter <b>de</b>
                <select id="select-from">
                    <option value="real">R$ Real Brasileiro</option>
                    <option value="dolar">US$ Dólar Americano</option>
                    <option value="euro">€ Euro</option>
                    <option value="iene">¥ Iene</option>
                    <option value="libra">£ Libra</option>
                    <option value="bitcoin">₿ Bitcoin</option>
                </select>
            </label>

            <div id="divConvertFor">
                <label id="convert-for">Converter <b>para</b>
                    <select id="select-for">
                        <option value="dolar">US$ Dólar Americano</option>
                        <option value="euro">€ Euro</option>
                        <option value="libra">£ Libra</option>
                        <option value="iene">¥ Iene</option>
                        <option value="real">R$ Real Brasileiro</option>
                        <option value="bitcoin"> ₿ Bitcoin</option>
                    </select>
                </label>
            </div>
            <div id="div-valor">
                <label id="valor">Valor
                    <input id="input-value" placeholder="R$ 1.000,00" />
                </label>
                <button id="convert-button">Converter</button>
            </div>
            <section>
                <div id="div-a-converter">
                    <img class="img-currency-convert-from" src="./assets/brasil 2.png" alt="img-moeda-a-converter" />
                    <p class="title-currency-from">Real</p>
                    <p class="paragraph-end-value">R$ 0,00</p>
                </div>

                <img id="arrow" src="./assets/Vector.png" alt="arrow-img" />

                <div id="convertido">
                    <img class="img-currency-converted" src="./assets/estados-unidos (1) 1.png" alt="img-moeda-convertida" />
                    <p class="title-currency-to">Dólar Americano</p>
                    <p class="paragraph-end">US$ 0,00</p>
                </div>
            </section>
    </main>
</body>
<script src="./script.js" rel="script" ></script>
</html>
