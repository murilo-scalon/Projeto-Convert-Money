<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <title>DevClub - Convert Money</title>
</head>

<body>
    <main>

        <img src="./assets/logo.gif" alt="logo-changeMoney" />

        <div id="divConvertFrom">
            <label id="convert-from">Converter <b>de</b></label>
            <select id="select-from">
                <option>R$ Real Brasileiro</option>
                <option>US$ Dólar Americano</option>
                <option>€ Euro</option>
                <option>£ Libra</option>
                <option>₿ Bitcoin</option>
            </select>

            <div id="divConvertFor">
                <label id="convert-for">Converter <b>para</b></label>
                <select id="select-for">
                    <option>US$ Dólar Americano</option>
                    <option>¢ Euro</option>
                    <option>£ Libra</option>
                    <option>₿ Bitcoin</option>
                    <option>R$ Real Brasileiro</option>
                </select>
            </div>
            <div id="div-valor">
                <label id="valor">Valor
                    <input placeholder="R$ 1.000,00" />
                </label>
                <button>Converter</button>
            </div>
            <section>
                <div id="divEnd">
                    <img id="brasil" src="./assets/brasil 2.png" alt="img-moeda-a-converter" />
                    <p class="title-end">Real</p>
                    <p class="paragraph-end">R$ 0,00</p>
                </div>
                
                <img id="arrow" src="./assets/Vector.png" alt="arrow-img" />

                <div>
                    <img id="usa" src="./assets/estados-unidos (1) 1.png" alt="img-moeda-convertida" />
                    <p class="title-end">Dólar Americano</p>
                    <p class="paragraph-end">US$ 0,00</p>
                </div>
            </section>
    </main>
</body>

</html>
